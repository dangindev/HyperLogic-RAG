model:
  vocab_size: 21648
  embed_dim: 512
  num_heads: 8
  num_decoder_layers: 6
  dropout: 0.1
  use_relational_memory: true
  use_mcln: false  # SCST on MIMIC does not use MCLN (yet)
  rm_num_slots: 3
  rm_d_model: 512
  
  visual_encoder:
    type: 'biomedclip'
    freeze_backbone: true

dataset:
  data_root: 'HyperLogicRAG/data'
  hypergraph_path: 'HyperLogicRAG/data/hypergraph.pkl'
  manifest_file: 'mimic_scst_50k.jsonl'  # NEW: Fast Subset
  image_size: 224
  max_length: 60       # SHORTER GENERATION for speed
  batch_size: 24       # Increased from 16 for H100
  num_workers: 8
  val_split: 'validate'
  normalization: 'clip'

training:
  epochs: 20           # 20 epochs on 50k data ~ 4 epochs on full data
  learning_rate: 0.000005  # 5e-6 (Low LR for stability)
  weight_decay: 0.01
  gradient_clip: 1.0
  val_every: 1         # Validate every epoch (since epoch is short)
  
  reward_mix:
    cider: 0.5
    ce_f1: 0.5

output:
  output_dir: 'results/hyperlogic_mimic_scst_fast'
  save_every: 1
  log_every: 50
  metrics_file: 'logs/hl_scst_fast.out'
