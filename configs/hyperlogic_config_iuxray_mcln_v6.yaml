model:
  vocab_size: 21648
  embed_dim: 512
  num_heads: 8
  num_decoder_layers: 3
  dropout: 0.25              # INCREASED from 0.15 (v5) to prevent overfitting
  use_relational_memory: true
  use_mcln: true
  rm_num_slots: 3
  rm_d_model: 512

  visual_encoder:
    type: 'biomedclip'
    freeze_backbone: true

dataset:
  data_root: 'data'
  hypergraph_path: 'HyperLogicRAG/data/hypergraph.pkl'
  manifest_file: 'iu_cxr_clean.jsonl'
  image_size: 224
  max_length: 128
  batch_size: 128
  num_workers: 8
  val_split: 'test'

training:
  val_every: 1
  epochs: 80
  learning_rate: 0.0001
  warmup_epochs: 2
  weight_decay: 0.05
  lambda_logic: 0.1
  gradient_clip: 1.0
  label_smoothing: 0.1      # RE-ENABLED to regularize
  early_stopping_patience: 20

output:
  output_dir: 'results/hyperlogic_iuxray_mcln_v6'
  save_every: 5
  log_every: 10
