model:
  vocab_size: 21648
  embed_dim: 512
  num_heads: 8
  num_decoder_layers: 3
  dropout: 0.15              # Lower than v1 (0.3) to prevent underfitting
  use_relational_memory: true
  use_mcln: true
  rm_num_slots: 3
  rm_d_model: 512

  visual_encoder:
    type: 'biomedclip'
    freeze_backbone: true

dataset:
  data_root: 'data'
  hypergraph_path: 'HyperLogicRAG/data/hypergraph.pkl'
  manifest_file: 'iu_cxr_clean.jsonl'
  image_size: 224
  max_length: 128
  batch_size: 128
  num_workers: 8
  val_split: 'test'

training:
  val_every: 1              # Validate EVERY epoch
  epochs: 80
  learning_rate: 0.0001     # SAME as v1 (proven to reach 0.409 BL-1)
  warmup_epochs: 3          # Short warmup to smooth first epochs
  weight_decay: 0.05
  lambda_logic: 0.1
  gradient_clip: 1.0
  label_smoothing: 0.1      # Soft labels for stability
  early_stopping_patience: 20

output:
  output_dir: 'results/hyperlogic_iuxray_mcln_v3'
  save_every: 5
  log_every: 10
