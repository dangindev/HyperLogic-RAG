experiment:
  name: "simple_rag_baseline"
  output_dir: "/home/dangnh3/MICCAI2026/HyperLogicRAG/results/rag"

dataset:
  name: "mimic_cxr"
  data_root: "/home/dangnh3/MICCAI2026/HyperLogicRAG/data" 
  manifest_file: "mimic_cxr_clean.jsonl"
  retrieval_file: "rag_index.json"
  image_dir: "/home/dangnh3/MICCAI2026/HyperLogicRAG/data/mimic_cxr/images"
  max_length: 100
  image_size: 224
  batch_size: 16
  num_workers: 8

model:
  type: "rag"
  encoder: "resnet50"
  decoder: "transformer"
  embed_dim: 512
  num_heads: 8
  num_layers: 3
  vocab_size: 30522 
  dropout: 0.1

training:
  epochs: 30
  lr: 1e-4
  seed: 42
  gradient_accumulation_steps: 1
  fp16: false
  save_interval: 1000
  val_interval: 1000
