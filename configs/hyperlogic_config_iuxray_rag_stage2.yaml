model:
  vocab_size: 21648
  embed_dim: 512
  num_heads: 8
  num_decoder_layers: 3
  dropout: 0.15
  use_relational_memory: true
  use_mcln: true
  rm_num_slots: 3
  rm_d_model: 512

  visual_encoder:
    type: 'biomedclip'
    freeze_backbone: true

dataset:
  data_root: '/home/dangnh3/MICCAI2026/HyperLogicRAG/data'
  hypergraph_path: 'HyperLogicRAG/data/hypergraph.pkl'
  manifest_file: 'iu_cxr_clean.jsonl'
  image_size: 224
  max_length: 128
  batch_size: 64
  num_workers: 8
  val_split: 'test'
  retrieval_file: 'rag_index_iuxray_biomedclip.json'  # under data_root

training:
  val_every: 1
  epochs: 80
  learning_rate: 0.00005   # Half of Stage 1 lr — fine-tuning on top of converged model
  warmup_epochs: 2
  weight_decay: 0.05
  lambda_logic: 0.1
  gradient_clip: 1.0
  label_smoothing: 0.0
  early_stopping_patience: 20
  # Resume from best Stage 1 checkpoint
  resume: 'results/hyper_r2gen_iuxray_transfer/model_best.pth'
  strict_load: false       # Allow missing RAG head keys

output:
  output_dir: 'results/iu_rag_biomedclip_stage2'
  save_every: 5
  log_every: 10
