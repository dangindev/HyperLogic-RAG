model:
  vocab_size: 21648
  embed_dim: 512
  num_heads: 8
  num_decoder_layers: 3
  dropout: 0.2
  use_relational_memory: true
  use_mcln: false  # Base + RM (Match Job 3465 architecture)
  rm_num_slots: 3
  rm_d_model: 512
  
  visual_encoder:
    type: 'biomedclip' # Use same encoder
    freeze_backbone: true # Start frozen first? Or unfreeze immediately?
    # Usually Transfer: Freeze first few epochs, then unfreeze?
    # Or just Unfreeze with small LR?
    # User said "train tiếp". Job 3465 is frozen.
    # Let's keep Frozen first to adapt decoder to IU X-Ray style, then unfreeze later?
    # Or just run Frozen Transfer (like v6 but from correct source).
    # Let's try Unfrozen Transfer immediately with small LR.
    # Actually, Job 3521 (Unfrozen scratch) is slow.
    # Job Transfer Frozen might be faster.
    # Let's set freeze_backbone: false but very small LR.
    freeze_backbone: false

dataset:
  data_root: 'HyperLogicRAG/data'
  hypergraph_path: 'HyperLogicRAG/data/hypergraph.pkl'
  manifest_file: 'iu_cxr_clean.jsonl'
  image_size: 224
  max_length: 128
  batch_size: 16
  num_workers: 4
  val_split: 'test'

training:
  transfer_from: 'results/hyperlogic_biomedclip/checkpoint_epoch_30.pth' # Explicit transfer
  val_every: 5
  epochs: 100 
  learning_rate: 1e-4   # Decoder
  backbone_lr: 1e-5     # Backbone
  weight_decay: 0.05
  lambda_logic: 0.1
  gradient_clip: 1.0

output:
  output_dir: 'results/hyperlogic_iuxray_transfer_v7'
  save_every: 5
  log_every: 10
