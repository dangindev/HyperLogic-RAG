
model:
  vocab_size: 21648
  embed_dim: 512
  num_heads: 8
  num_decoder_layers: 3
  dropout: 0.1
  use_relational_memory: true
  use_mcln: false
  rm_num_slots: 3
  rm_d_model: 512
  
  visual_encoder:
    type: 'biomedclip'
    freeze_backbone: true

dataset:
  data_root: 'HyperLogicRAG/data'
  hypergraph_path: 'HyperLogicRAG/data/hypergraph.pkl'
  manifest_file: 'mimic_cxr_clean.jsonl'
  image_size: 224
  max_length: 128
  batch_size: 16  # SCST usually 16-32.
  num_workers: 8

training:
  scst: true
  scst_weight: 1.0 
  val_every: 1
  epochs: 50
  learning_rate: 0.000005
  weight_decay: 0.01
  lambda_logic: 0.0
  gradient_clip: 1.0
  reward_mix:   # New param for our modified script
    cider: 0.4
    ce_f1: 0.6  # Emphasize Clinical Accuracy

output:
  output_dir: 'results/hyperlogic_mimic_scst_v2'
  save_every: 1
  log_every: 10
