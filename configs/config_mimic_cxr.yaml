model:
  vocab_size: 21648  # R2Gen tokenizer vocab size
  embed_dim: 512
  num_heads: 8
  num_decoder_layers: 3  # Reduced from 6 to match R2Gen standard
  
  # DenseNet121 Visual Encoder (CheXpert Pretrained)
  # Better than CLIP for entity detection task
  visual_encoder:
    type: 'densenet121'  # Pure vision model for entity classification
    pretrained_source: 'chexpert'  # Chest X-ray specific weights
    freeze_backbone: false  # Fine-tune on MIMIC-CXR
    output_dim: 512  # Match embed_dim

dataset:
  data_root: 'HyperLogicRAG/data'
  hypergraph_path: 'HyperLogicRAG/data/hypergraph.pkl'
  manifest_file: 'mimic_cxr_clean.jsonl'
  image_size: 224
  max_length: 128
  batch_size: 128 # Reduced from 256 to fix OOM on H100
  num_workers: 8

training:
  val_every: 5
  epochs: 100  # Full training for best results
  learning_rate: 0.0001
  weight_decay: 0.01
  lambda_logic: 0.1  # Weight for logic loss (Reduced to prevent collapse)
  gradient_clip: 1.0
  # save_every is not used by code directly, but config['output']['save_every'] is used
  # wait, I patched code to use config['output']['save_every'].
  # The original file didn't have 'output' section under 'training'.
  # It had 'experiment: output_dir'.
  # I need to careful about key names.

output:
  output_dir: 'results/hyperlogic_biomedclip'
  save_every: 5
  log_every: 10
