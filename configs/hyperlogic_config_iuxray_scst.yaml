model:
  vocab_size: 21648
  embed_dim: 512
  num_heads: 8
  num_decoder_layers: 3
  dropout: 0.2
  use_relational_memory: true
  use_mcln: false  # Using standard logic decoder (Job 3393 Base)
  rm_num_slots: 3
  rm_d_model: 512
  
  visual_encoder:
    type: 'biomedclip' 
    freeze_backbone: true # SCST usually keeps backbone frozen to avoid instability

dataset:
  data_root: 'data'
  hypergraph_path: 'HyperLogicRAG/data/hypergraph.pkl'
  manifest_file: 'iu_cxr_clean.jsonl'
  image_size: 224
  max_length: 100
  batch_size: 16
  num_workers: 2
  val_split: 'test'

training:
  epochs: 10
  learning_rate: 0.000005 # 5e-6
  weight_decay: 0.05

output:
  output_dir: 'results/hyperlogic_iuxray_scst'
