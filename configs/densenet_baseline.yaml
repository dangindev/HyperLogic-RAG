experiment:
  name: "densenet121_baseline"
  output_dir: "/home/dangnh3/MICCAI2026/HyperLogicRAG/results/densenet_baseline"

dataset:
  name: "mimic_cxr"
  data_root: "/home/dangnh3/MICCAI2026/HyperLogicRAG/data" 
  manifest_file: "mimic_cxr_clean.jsonl"
  image_dir: "/home/dangnh3/MICCAI2026/HyperLogicRAG/data/mimic_cxr/images"
  max_length: 100
  image_size: 224
  batch_size: 24  # Larger batch for lighter model
  num_workers: 8

model:
  encoder: "densenet121"  # Changed from resnet50
  decoder: "transformer"
  embed_dim: 512
  num_heads: 8
  num_layers: 3
  vocab_size: 30522 
  dropout: 0.1

training:
  epochs: 20  # 20 epochs for quick iteration
  lr: 3e-4  # Slightly higher LR for DenseNet
  seed: 42
  gradient_accumulation_steps: 1
  fp16: false
  save_interval: 1000
  val_interval: 1000
  resume_from: null  # Start fresh
