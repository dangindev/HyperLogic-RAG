experiment:
  name: "densenet121_baseline_v2"
  output_dir: "/home/dangnh3/MICCAI2026/HyperLogicRAG/results/densenet_baseline_v2"

dataset:
  name: "mimic_cxr"
  data_root: "/home/dangnh3/MICCAI2026/HyperLogicRAG/data" 
  manifest_file: "mimic_cxr_clean.jsonl"
  image_dir: "/home/dangnh3/MICCAI2026/HyperLogicRAG/data/mimic_cxr/images"
  max_length: 100
  image_size: 224
  batch_size: 24
  num_workers: 8
  tokenizer: "bert-base-uncased"

model:
  encoder: "densenet121"
  decoder: "transformer"
  embed_dim: 512
  num_heads: 8
  num_layers: 3
  vocab_size: 30522  # BERT vocab
  dropout: 0.1

training:
  epochs: 20
  lr: 1e-4  # REDUCED from 3e-4
  label_smoothing: 0.1  # NEW - prevent overconfidence
  warmup_steps: 2000  # NEW - stable early training
  scheduled_sampling:  # NEW - gradually use model predictions
    enabled: true
    start_epoch: 6
    end_epoch: 11
    final_ratio: 0.5
  gradient_clip: 1.0
  seed: 42
  gradient_accumulation_steps: 1
  fp16: false
  save_interval: 1000
  val_interval: 1000
  resume_from: null
