model:
  vocab_size: 21648  # R2Gen tokenizer vocab size
  embed_dim: 512
  num_heads: 8
  num_decoder_layers: 6
  
  # Visual Encoder is HARDCODED in src/train_hyperlogic_biomedclip.py
  # It ignores this section, but we keep a placeholder comment
  visual_encoder:
    type: 'biomedclip' # Hardcoded in script
    freeze_backbone: true

dataset:
  data_root: 'data'
  hypergraph_path: 'HyperLogicRAG/data/hypergraph.pkl'
  manifest_file: 'iu_cxr_clean.jsonl'
  image_size: 224
  max_length: 128
  batch_size: 32
  num_workers: 2
  val_split: 'test'  # Explicitly use test set for validation

training:
  val_every: 5
  epochs: 100 
  learning_rate: 0.0001
  weight_decay: 0.01
  lambda_logic: 0.1
  gradient_clip: 1.0

output:
  output_dir: 'results/hyperlogic_iuxray'
  save_every: 5
  log_every: 10
