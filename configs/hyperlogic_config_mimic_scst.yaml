model:
  vocab_size: 21648
  embed_dim: 512
  num_heads: 8
  num_decoder_layers: 3
  dropout: 0.1
  use_relational_memory: true
  use_mcln: false  # Base + RM (Job 3465 architecture)
  rm_num_slots: 3
  rm_d_model: 512
  
  visual_encoder:
    type: 'biomedclip' # Hardcoded in train script, but kept here for clarity
    freeze_backbone: true # Keep frozen during SCST usually (or unfreeze deeply?)
    # Usually SCST fine-tunes decoder only to avoid collapse, unless very careful.
    # Let's keep frozen for stability first.

dataset:
  data_root: 'HyperLogicRAG/data'
  hypergraph_path: 'HyperLogicRAG/data/hypergraph.pkl'
  manifest_file: 'mimic_cxr_clean.jsonl'
  image_size: 224
  max_length: 128
  batch_size: 32 # SCST needs smaller batch size effectively, or same? 
  # SCST samples multiple beams. 32 * 5 beams = 160. might OOM on 1 GPU.
  # Let's use 16 to be safe.
  num_workers: 4

training:
  scst: true
  scst_weight: 1.0 # 1.0 * Reward - 0.1 * CE? usually pure SCST or mixed.
  # The code `train_scst.py` (if exists) handles this.
  # Using `train_hyperlogic_biomedclip.py`? Does it support SCST?
  # Step 690 ls showed `train_scst.py`.
  # I should use `train_scst.py`.
  val_every: 1
  epochs: 50
  learning_rate: 5e-6 # Very low LR for SCST
  weight_decay: 0.01
  lambda_logic: 0.0 # Disable logic loss during SCST? or keep?
  # Usually SCST maximizes CIDEr/BLEU. Logic loss might interfere?
  # Let's keep small if supported.
  gradient_clip: 5.0

output:
  output_dir: 'results/hyperlogic_mimic_scst'
  save_every: 1
  log_every: 10
