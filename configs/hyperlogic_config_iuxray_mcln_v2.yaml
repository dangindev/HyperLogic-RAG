model:
  vocab_size: 21648
  embed_dim: 512
  num_heads: 8
  num_decoder_layers: 3
  dropout: 0.15              # Balanced: regularize but don't kill signal
  use_relational_memory: true
  use_mcln: true            # ENABLE MCLN
  rm_num_slots: 3
  rm_d_model: 512

  visual_encoder:
    type: 'biomedclip'
    freeze_backbone: true

dataset:
  data_root: 'data'
  hypergraph_path: 'HyperLogicRAG/data/hypergraph.pkl'
  manifest_file: 'iu_cxr_clean.jsonl'
  image_size: 224
  max_length: 128
  batch_size: 128
  num_workers: 8
  val_split: 'test'

training:
  val_every: 1              # Validate EVERY epoch (catch best checkpoint)
  epochs: 80
  learning_rate: 0.00003    # 3e-5: Low enough to prevent epoch-2-style collapse
  warmup_epochs: 5          # Linear warmup: 0.01*lr → lr over 5 epochs
  weight_decay: 0.05
  lambda_logic: 0.1
  gradient_clip: 1.0
  label_smoothing: 0.1      # Soft labels for better generalization
  early_stopping_patience: 15  # Stop if no val improvement for 15 validations

output:
  output_dir: 'results/hyperlogic_iuxray_mcln_v2'
  save_every: 5
  log_every: 10
