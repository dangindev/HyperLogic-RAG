model:
  vocab_size: 21648  # R2Gen tokenizer vocab size
  embed_dim: 512
  num_heads: 8
  num_decoder_layers: 6
  
  # DenseNet121 Visual Encoder (CheXpert Pretrained)
  # Better than CLIP for entity detection task
  visual_encoder:
    type: 'densenet121'  # Pure vision model for entity classification
    pretrained_source: 'chexpert'  # Chest X-ray specific weights
    freeze_backbone: false  # Fine-tune on MIMIC-CXR
    output_dim: 512  # Match embed_dim

dataset:
  data_root: 'data'
  hypergraph_path: 'data/hypergraph.pkl'
  manifest_file: 'mimic_cxr_clean.jsonl'
  image_size: 224
  max_length: 128
  batch_size: 64  # Increased for H100 (was 8)
  num_workers: 2

training:
  val_every: 5
  epochs: 100  # Full training for best results
  learning_rate: 0.0001
  weight_decay: 0.01
  lambda_logic: 0.1  # Weight for logic loss (Reduced to prevent collapse)
  gradient_clip: 1.0
  save_every: 2  # Save every 2 epochs

experiment:
  output_dir: 'results/hyperlogic_rag_v2'
  log_dir: 'logs/hyperlogic_rag'
