model:
  vocab_size: 21648  # R2Gen tokenizer vocab size (MIMIC)
  embed_dim: 512
  num_heads: 8
  num_decoder_layers: 3
  dropout: 0.1
  use_relational_memory: true
  use_mcln: true            # ENABLE MCLN (Memory-Conditioned Layer Norm)
  rm_num_slots: 3
  rm_d_model: 512

  visual_encoder:
    type: 'biomedclip'
    freeze_backbone: true   # Frozen BiomedCLIP

dataset:
  data_root: 'HyperLogicRAG/data'
  hypergraph_path: 'HyperLogicRAG/data/hypergraph.pkl'
  manifest_file: 'mimic_cxr_clean.jsonl'
  image_size: 224
  max_length: 128
  batch_size: 128           # Optimized for H100 (MCLN adds ~100K params, still fits)
  num_workers: 8

training:
  val_every: 5
  epochs: 100
  learning_rate: 0.0001
  weight_decay: 0.01
  lambda_logic: 0.1
  gradient_clip: 1.0

output:
  output_dir: 'results/hyperlogic_mimic_mcln'
  save_every: 5
  log_every: 10
